<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }

    .calculator {
      background-color: #333;
      height: 50%;
      width: 30%;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    .display {
      margin-bottom: 10px;
    }

    #result {
      width: 100%;
      height: 50px;
      font-size: 24px;
      text-align: right;
      padding: 5px;
      box-sizing: border-box;
      border: none;
      background-color: #fff;
      color: #333;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-gap: 9px;
    }

    .btn {
      width: 85%;
      height: 50px;
      font-size: 18px;
      background-color: #555;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #777;
    }

    .btn.special {
      background-color: #007bff;
    }

    .btn.special:hover {
      background-color: #0056b3;
    }
    .btn1 {
      background-color: rgb(172, 55, 55);
      color: #f5e8e8;
      font-size: 25px;
      border-radius: 5px;
      width: 90%;
    }
  </style>
  <body>
    <div class="calculator">
      <div class="display">
        <input type="text" id="result" disabled />
      </div>
      <div class="buttons">
        <button class="btn1" onclick="clearDisplay()">C</button>
        <button class="btn" onclick="deleteChar()">DEL</button>
        <button class="btn" onclick="calculate()">=</button>
        <button class="btn" onclick="appendToDisplay('+')">+</button>
        <button class="btn" onclick="appendToDisplay('-')">-</button>
        <button class="btn" onclick="appendToDisplay('/')">/</button>
        <button class="btn" onclick="appendToDisplay('*')">*</button>
        <button class="btn" onclick="appendToDisplay('(')">&#40;</button>
        <button class="btn" onclick="appendToDisplay(')')">&#41;</button>
        <button class="btn" onclick="appendToDisplay('0')">0</button>
        <button class="btn" onclick="appendToDisplay('1')">1</button>
        <button class="btn" onclick="appendToDisplay('2')">2</button>
        <button class="btn" onclick="appendToDisplay('3')">3</button>
        <button class="btn" onclick="appendToDisplay('4')">4</button>
        <button class="btn" onclick="appendToDisplay('5')">5</button>
        <button class="btn" onclick="appendToDisplay('6')">6</button>
        <button class="btn" onclick="appendToDisplay('7')">7</button>
        <button class="btn" onclick="appendToDisplay('8')">8</button>
        <button class="btn" onclick="appendToDisplay('9')">9</button>
        <button class="btn" onclick="appendToDisplay('e')">e</button>
        <button class="btn" onclick="appendToDisplay('pi')">π</button>
        <button class="btn" onclick="appendToDisplay('sqrt(')">√</button>
        <button class="btn" onclick="appendToDisplay('sin(')">sin</button>
        <button class="btn" onclick="appendToDisplay('cos(')">cos</button>
        <button class="btn" onclick="appendToDisplay('tan(')">tan</button>
        <button class="btn" onclick="appendToDisplay('log(')">log</button>
        <button class="btn" onclick="appendToDisplay('ln(')">ln</button>
        <button class="btn" onclick="appendToDisplay('deg(')">deg</button>
        <button class="btn" onclick="appendToDisplay('rad(')">rad</button>
        <button class="btn" onclick="appendToDisplay('.')">.</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
